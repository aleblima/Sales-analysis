<main class="page-container">
  <div class="background-glow"></div>

  <header class="page-header">
    <div class="header-content">
      <div class="badge">Cadastro</div>
      <h1 class="page-title">Novo Vendedor</h1>
      <p class="page-subtitle">Adicione um novo vendedor e associe-o a uma região de atuação no sistema.</p>
    </div>
    <div class="header-actions">
      <a class="btn-secondary" routerLink="/seller">Voltar</a>
    </div>
  </header>

  <section class="content-section custom-scrollbar">
    <div class="form-card">
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name" class="form-label">Nome do Vendedor</label>
          <input type="text" id="name" name="name" class="form-control" [(ngModel)]="name"
            placeholder="Ex: João Silva..." required autofocus />
        </div>

        <div class="form-group">
          <label for="idregion" class="form-label">Região</label>
          <select id="idregion" name="idregion" class="form-control" [(ngModel)]="idregion" required>
            <option value="" disabled selected>Selecione a região</option>
            @for (region of regions(); track region.id) {
            <option [value]="region.id">{{ region.name }}</option>
            }
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="!name || !idregion">
            Salvar Vendedor
          </button>
        </div>
      </form>
    </div>
  </section>
</main>
